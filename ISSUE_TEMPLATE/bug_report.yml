name: 🐛 Bug report
description: Report a Bug
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill in as much details as possible.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Precise steps to reliably reproduce the issue. If you don't know, just say it, it's fine 😄
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Actual behavior
      description: What actually happened? Please include any logs, screenshots or files if relevant.
    validations:
      required: true