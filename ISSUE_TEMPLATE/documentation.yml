name: 📖 Documentation issue
description: Report missing, incorrect or unclear documentation
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: URL or file path of the documentation affected.
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Issue type
      options:
        - Missing documentation
        - Incorrect information
        - Outdated information
        - Unclear or confusing
        - Typo or formatting
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what is wrong or missing.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you have a suggestion for how to fix or improve it.
    validations:
      required: false